# lefthook.yml

pre-commit:
  parallel: true
  commands:
    # 提交前检查代码风格并格式化 staged 文件的代码
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    # push 之前验证类型安全
    type-check:
      run: pnpm run type
    
    # push 之前验证死代码（knip）
    dead-code-check:
      run: pnpm run dead

    # push 之前运行测试用例
    test:
      run: pnpm test
